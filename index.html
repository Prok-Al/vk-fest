<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VK Fest — Квест: ответы</title>
  <link rel="icon" type="image/png" sizes="400x400" href="static/favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="page-header">
    <h1 class="page-title">Квест</h1>
    <div class="city-picker">
      <label class="city-label" for="citySelect">Город</label>
      <select id="citySelect" class="city-select">
        <option value="" disabled selected>Загрузка городов…</option>
      </select>
    </div>
    <p class="page-subtitle" id="questSubtitle"></p>
  </header>

  <main id="content" class="content">
    <p class="loading">Загрузка…</p>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Закрыть">&times;</button>
      <h2 class="modal-title" id="modalTitle"></h2>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
